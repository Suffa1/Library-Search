{% extends "base.html" %}
{% block title %}Book Log{% endblock %}
{% block head %}
    {{ super() }}
    <link rel="stylesheet" href="{{ url_for('static', filename='storagebook.css') }}">
{% endblock %}
{% block content %}

    <div class="parent">
        <div class="div2">
            <h1>Book Log</h1>

            <div class="input-group">
                <label for="bookInput">Book Title:</label>
                <input type="text" id="bookInput" placeholder="Enter book title..." class="theme-input">
            </div>

            <div class="input-group">
                <label for="dateInput">Date:</label>
                <input type="date" id="dateInput" class="theme-input">
            </div>

            <div class="button-container">
                <button onclick="addEntry()" class="theme-button">Add Entry</button>
            </div>

            <div class="entries" id="entries"></div>

            <div class="button-container">
                <button class="theme-button clear-btn" onclick="clearAll()">Clear All Entries</button>
            </div>

            <p style="text-align: center; margin-top: 10px;">
                <a href="{{ url_for('hello') }}" style="color: white; text-decoration: none; font-size: 12px;">
                    Back to Home
                </a>
            </p>
        </div>
    </div>

    <script>
        let currentEntries = [];

        window.onload = function() {
            loadEntries();
            document.getElementById('dateInput').valueAsDate = new Date();
        };

        async function loadEntries() {
            try {
                const response = await fetch('/api/entries');
                currentEntries = await response.json();
                displayEntries();
            } catch (error) {
                console.error('Error loading entries:', error);
            }
        }

        async function addEntry() {
            const bookInput = document.getElementById('bookInput');
            const dateInput = document.getElementById('dateInput');
            const book = bookInput.value.trim();
            const date = dateInput.value;

            if (!book || !date) {
                alert('Please enter a book title and select a date');
                return;
            }

            try {
                const response = await fetch('/api/entries', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ book, date })
                });

                if (response.ok) {
                    bookInput.value = '';
                    dateInput.valueAsDate = new Date();
                    loadEntries();
                    bookInput.focus();
                } else {
                    const error = await response.json();
                    alert(error.error || 'Error adding entry');
                }
            } catch (error) {
                alert('Error adding entry: ' + error.message);
            }
        }

        async function deleteEntry(entryId) {
            if (!confirm('Are you sure you want to delete this entry?')) return;

            try {
                await fetch(`/api/entries/${entryId}`, { method: 'DELETE' });
                loadEntries();
            } catch (error) {
                alert('Error deleting entry');
            }
        }

        async function clearAll() {
            if (confirm('Are you sure you want to delete ALL entries?')) {
                try {
                    await fetch('/api/entries/clear', { method: 'DELETE' });
                    loadEntries();
                } catch (error) {
                    alert('Error clearing entries');
                }
            }
        }

        function displayEntries() {
            const entriesDiv = document.getElementById('entries');
            if (currentEntries.length === 0) {
                entriesDiv.innerHTML = '<div class="empty">No entries yet. Add your first book!</div>';
                return;
            }

            entriesDiv.innerHTML = currentEntries.map(entry => `
                <div class="entry">
                    <div class="entry-date">${formatDate(entry.date)}</div>
                    <div class="entry-book">"${entry.book}"</div>
                    <button onclick="deleteEntry(${entry.id})" 
                        style="float:right; background:#f44336; padding:5px 10px; 
                               color:white; border:none; border-radius:3px; cursor:pointer;">
                        Delete
                    </button>
                </div>
            `).join('');
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const activeElement = document.activeElement;
                if (activeElement.id === 'bookInput') {
                    document.getElementById('dateInput').focus();
                } else if (activeElement.id === 'dateInput') {
                    addEntry();
                }
            }
        });
    </script>

{% endblock %}
