<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>
    <div class="parent">
        <div class="div2">
            <h1>Login</h1>
            <form action="/login" method="post">
                <p>Username</p>
                <input type="text" name="username" class="theme-input" required/>
                
                <p>Password</p>
                <input type="password" name="password" class="theme-input" required/>
                
                <div class="button-container">
                    <input type="submit" value="Login" class="theme-button"/>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
