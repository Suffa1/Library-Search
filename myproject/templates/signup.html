<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>
    <div class="parent">
        <div class="div2">
            <h1>Create Account</h1>
            <form action="/register" method="post">
                <p>Choose Username</p>
                <input type="text" name="username" class="theme-input" required/>
                <p>Choose Password</p>
                <input type="password" name="password" class="theme-input" required/>
                <div class="button-container">
                    <input type="submit" value="Sign Up" class="theme-button"/>
                </div>
            </form>
            <p style="text-align: center; margin-top: 10px;">
                <a href="{{ url_for('index') }}" style="color: white; text-decoration: none; font-size: 12px;">Back to Login</a>
            </p>
        </div>
    </div>
</body>
</html>
